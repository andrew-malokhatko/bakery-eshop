<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="site-wrapper">

        <header class="header">
            <a class="logo" href="index.html">
                <img src="resources/logo.png" alt="Bakery Logo">
            </a>

            <nav class="header-links">
                <a href="shop.html">Shop</a>
                <a href="index.html#review">About</a>
                <a href="contact.html">Contact</a>
            </nav>

            <div class="header-actions">
                <a class="cart" href="cart.html" aria-label="Cart">
                    <img src="resources/shopping-cart.png" alt="Cart">
                </a>
                <a class="login" href="login.html">Log in</a>
            </div>
        </header>

        <section class="contact">
            <h1>Let’s talk</h1>
            <p>Have a question about an order, delivery, or custom cake? Send us a message and we’ll get back to you soon.</p>

            <input type="fullname" class="fullname" placeholder="Full name">
            <input type="email" class="email" placeholder="Email address">
            <input type="email_mes" class="email_mes" placeholder="Your message">

            <div class="service-group">
                <span>Service you're interested in:</span>
                <label class="service-option">
                    <input type="checkbox" name="service" value="orders" />
                    Orders
                </label>
                <label class="service-option">
                    <input type="checkbox" name="service" value="delivery" />
                    Delivery
                </label>
                <label class="service-option">
                    <input type="checkbox" name="service" value="custom" />
                    Custom cakes
                </label>
            </div>

            <div class="form-actions">
                <button class="submit" type="submit">Send</button>
            </div>


        </section>

        <aside class="contact-info-card">
            <div class="contact-info">
                <a class="contact-chip address" href="#">Main Street 12<br>Bratislava, Slovakia</a>
                <a class="contact-chip" href="mailto:hello@bakery.com">hello@bakery.com</a>
                <a class="contact-chip" href="tel:+421900123456">+421 900 123 456</a>
            </div>
        </aside>

        <footer class="footer">
            <div class="social">
                <a href="#" aria-label="Instagram">
                    <img src="resources/instagram.svg" alt="" class="icon" />
                </a>
                <a href="#" aria-label="Facebook">
                    <img src="resources/facebook.svg" alt="" class="icon" />
                </a>
                <a href="#" aria-label="TikTok">
                    <img src="resources/tiktok.svg" alt="" class="icon" />
                </a>
            </div>
            <div class="links">
                <a href="#">Contact</a>
                <a href="#">Terms &amp; Conditions</a>
                <a href="#">Delivery</a>
                <a href="#">Payment</a>
            </div>
            <img src="resources/logo.png" alt="Bakery Logo">
        </footer>

    </div>

</body>
</html>
