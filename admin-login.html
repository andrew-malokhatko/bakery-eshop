<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin log in</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="site-wrapper">
  <header class="header">
    <a class="logo" href="index.html">
      <img src="resources/logo.png" alt="Bakery Logo">
    </a>
  </header>

  <div class="auth admin-auth">
    <div class="content">
      <h1 class="name">Admin</h1>
      <h2 class="text">Log in</h2>
      <input type="email" class="email" placeholder="Email"></input>
      <input type="password" class="password" placeholder="Password"></input>
      <button class="log-in">Log in</button>
      <a class="lost-password" href="#">Lost your password?</a>
    </div>
  </div>
</div>

</body>
</html>
