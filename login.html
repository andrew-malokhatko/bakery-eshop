<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Login</title>
    <link rel="stylesheet" href="styles.css" />
	<script defer src="components/product-card.js"></script>
	<script defer src="components/category-card.js"></script>
    <script defer src="components/quantity-input.js"></script>
</head>

<body>
    <div class="site-wrapper">

    <header class="header">
        <a class="logo">
            <img src="https://placehold.co/100x100/fdf2f8/7e22ce?text=Logo" alt="Bakery Logo">
        </a>
        <nav class="header-links">
            <a href="#">Shop</a>
            <a href="#">World</a>
            <a href="#">Here</a>
        </nav>
        <a class="login">Log in</a>
    </header>

    <div class="auth">
        <img src="https://placehold.co/600x600/fdf2f8/7e22ce?text=Logo" alt="Bakery Logo">
        <div class="content">
            <h1 class="name">Bakery</h1>
            <h2 class="text">Welcome Back!</h2>
            <p class="has-account">Don't already have an account? <a href="#">Sign up</a>.</p>
            <input type="email" class="email" placeholder="Email"></input>
            <input type="password" class="password" placeholder="Password"></input>
            <button class="log-in">Log in</button>
            <a class="lost-password" href="#">Lost your password?</a>
        </div>
    </div>

    </div>
</body>

</html>
