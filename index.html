<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Bakery</title>
    <link rel="stylesheet" href="styles.css" />
		<script defer src="components/product-card.js"></script>
		<script defer src="components/category-card.js"></script>
</head>

<body>
  <div class="site-wrapper">

		<header class="header">
			<a class="logo">
				<img src="https://placehold.co/400x300/fdf2f8/7e22ce?text=Logo" alt="Bakery Logo">
			</a>
			<nav class="header-links">
				<a href="#">Shop</a>
				<a href="#">World</a>
				<a href="#">Here</a>
			</nav>
			<a class="login">Log in</a>
		</header>

		<section class="hero">
			<img src="https://placehold.co/400x300/fdf2f8/7e22ce?text=Hero" alt="Hero Image">
			<div class="text">
				<h1 class="title">Freshly baked bread</h1>
				<p class="desc">Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
				<div class="buttons">
					<button class="button primary">Order <span aria-hidden="true">&rarr;</span></button>
					<button class="button secondary">Learn more</button>
				</div>
			</div>
		</section>

		<div class="bestsellers">
			<h2 class="title">Bestsellers</h2>
			<div class="products">
					<product-card></product-card>
					<product-card></product-card>
					<product-card></product-card>
					<product-card></product-card>
			</div>
		</div>

		<div class="categories">
			<h2 class="title">Categories</h2>
			<div class="content">
				<category-card name="Bread" img-src="https://placehold.co/600x400/fdf2f8/7e22ce?text=Bread"></category-card>
				<category-card name="Cakes" img-src="https://placehold.co/600x400/fdf2f8/7e22ce?text=Cakes"></category-card>
				<category-card name="Pastries" img-src="https://placehold.co/600x400/fdf2f8/7e22ce?text=Pastries"></category-card>
				<category-card name="Cookies" img-src="https://placehold.co/600x400/fdf2f8/7e22ce?text=Cookies"></category-card>
			</div>
		</div>


  </div>
</body>

</html>
</DOCTYPE>
