<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Profile</title>
    <link rel="stylesheet" href="styles.css" />
	<script defer src="components/product-card.js"></script>
	<script defer src="components/category-card.js"></script>
    <script defer src="components/quantity-input.js"></script>
    <script defer src="components/profile-input.js"></script>
</head>

<body>
    <div class="site-wrapper">

        <header class="header">
            <a class="logo" href="index.html">
                <img src="resources/logo.png" alt="Bakery Logo">
            </a>

            <nav class="header-links">
                <a href="shop.html">Shop</a>
                <a href="index.html#review">About</a>
                <a href="contact.html">Contact</a>
            </nav>

            <div class="header-actions">
                <a class="cart" href="cart.html" aria-label="Cart">
                    <img src="resources/shopping-cart.png" alt="Cart">
                </a>
                <a class="login" href="login.html">Log in</a>
            </div>
        </header>

    <div class="profile">
        <div class="left">
            <span>user.email@example.com</span>
            <img class src="https://placehold.co/400x400/000000/000000?text=f">
        </div>  
        <div class="content">
            <h1 class="name">Bakery</h1>
            <h2 class="text">Welcome Back!</h2>

            <div class="row">
                <profile-input label="First Name" type="text" value="John" name="firstName"></profile-input>
                <profile-input label="Last Name" type="text" value="Wick" name="lastName"></profile-input>
            </div>

            <div class="row">
                <profile-input label="Email" type="email" value="user.email@example.com" name="email"></profile-input>
                <profile-input label="Contact Number" type="tel" value="+421984378328" name="contactNumber"></profile-input>
            </div>
            
            <div class="row">
                <profile-input label="Birthdate" type="text" placeholder="DD" name="day"></profile-input>
                <profile-input type="text" placeholder="MM" name="month"></profile-input>
                <profile-input type="text" placeholder="YYYY" name="year"></profile-input>
            </div>

            <fieldset class="gender-input">
                <input type="radio" id="male" checked />
                <label for="male">Male</label>
                <input type="radio" id="female" />
                <label for="female">Female</label>
                <input type="radio" id="other" />
                <label for="other">Other</label>
            </fieldset>

        </div>
    </div>

        <footer class="footer">
            <div class="social">
                <a href="#" aria-label="Instagram">
                    <img src="resources/instagram.svg" alt="" class="icon" />
                </a>
                <a href="#" aria-label="Facebook">
                    <img src="resources/facebook.svg" alt="" class="icon" />
                </a>
                <a href="#" aria-label="TikTok">
                    <img src="resources/tiktok.svg" alt="" class="icon" />
                </a>
            </div>
            <div class="links">
                <a href="#">Contact</a>
                <a href="#">Terms &amp; Conditions</a>
                <a href="#">Delivery</a>
                <a href="#">Payment</a>
            </div>
            <img src="resources/logo.png" alt="Bakery Logo">
        </footer>

    </div>
</body>

</html>
